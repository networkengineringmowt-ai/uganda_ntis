name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:   # allow manual runs from the Actions tab

concurrency:
  group: github-pages-deploy
  cancel-in-progress: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Build the platform directly with Vite. We deliberately skip `npm run
      # build` because that also runs the local-only `export-data` (Python,
      # reads G: Drive) and `tsc -b` steps, which don't belong on a CI runner —
      # the app's data is already committed under public/data, and Vite bundles
      # public/ (including media) from the full checkout.
      - name: Build
        run: npx vite build
        env:
          NODE_ENV: production
          VITE_SUPABASE_URL: https://vbidhkvzjigatfygnyc.supabase.co
          VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZiaWRoa3Z6amlnYXRmeWdueWNnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3Mzg0NDQsImV4cCI6MjA5NzMxNDQ0NH0.4M5lsUvcoh2giNpbF5X7nMPepNVp1U9Em6Ro4aZwgY4

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true
