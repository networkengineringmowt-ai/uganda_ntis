# ════════════════════════════════════════════════════════════════════════════
# UGROADS GIS Enterprise — WEB ADAPTOR (reverse proxy)
# The single public entry point for the whole stack — the open-source
# equivalent of the ArcGIS Web Adaptor. It terminates one origin and routes to
# every service so clients use ONE host with clean, stable paths and one TLS
# certificate, instead of juggling ports 8080 / 7800 / 9000 / 5060.
#
#   https://gis.unra.go.ug/portal/      → Portal (home, service catalogue)
#   https://gis.unra.go.ug/geoserver/   → GeoServer  (WMS / WFS-T / WMTS / WPS)
#   https://gis.unra.go.ug/tiles/       → pg_tileserv (MVT vector tiles)
#   https://gis.unra.go.ug/features/    → pg_featureserv (OGC API – Features)
#   https://gis.unra.go.ug/pgadmin/     → pgAdmin (DB administration)
#   https://gis.unra.go.ug/health       → adaptor health probe
# ════════════════════════════════════════════════════════════════════════════

worker_processes auto;
events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout 65;
  client_max_body_size 512m;          # allow large shapefile / GeoPackage uploads
  gzip on;
  gzip_types text/plain text/css application/json application/javascript application/xml
             application/x-protobuf image/svg+xml;
  gzip_min_length 512;

  # Shared tile cache (vector + raster) — 2 GB on disk, 1-day inactive eviction.
  proxy_cache_path /var/cache/nginx/tiles levels=1:2 keys_zone=tilecache:50m
                   max_size=2g inactive=1d use_temp_path=off;

  # Upstreams — the internal service mesh (docker-compose service names).
  upstream geoserver     { server geoserver:8080;    keepalive 16; }
  upstream tileserv      { server pg_tileserv:7800;   keepalive 16; }
  upstream featureserv   { server pg_featureserv:9000; keepalive 16; }
  upstream pgadmin       { server pgadmin:80;          keepalive 8;  }

  # Map proxied scheme so back-ends emit correct absolute URLs behind TLS.
  map $http_x_forwarded_proto $fwd_proto { default $scheme; https https; http http; }

  server {
    listen 80;
    server_name _;

    # ── Security headers (apply to everything) ──────────────────────────────
    add_header X-Frame-Options              SAMEORIGIN            always;
    add_header X-Content-Type-Options       nosniff               always;
    add_header Referrer-Policy              strict-origin-when-cross-origin always;
    add_header X-UGROADS-WebAdaptor         "nginx-oss"           always;

    # ── Health probe ────────────────────────────────────────────────────────
    location = /health { default_type text/plain; return 200 "UGROADS web adaptor OK\n"; }

    # ── Portal (static landing + service catalogue) ─────────────────────────
    location = / { return 302 /portal/; }
    location /portal/ {
      alias /usr/share/nginx/portal/;
      index index.html;
      try_files $uri $uri/ /portal/index.html;
    }

    # ── L4 · GeoServer — full OGC (WMS/WFS-T/WMTS/WPS) + REST admin ──────────
    location /geoserver/ {
      proxy_pass         http://geoserver/geoserver/;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $fwd_proto;
      proxy_set_header   X-Forwarded-Host  $host;
      proxy_read_timeout 300s;                       # long WPS / big WFS exports
    }

    # ── L4 · pg_tileserv — MVT vector tiles (cached) ────────────────────────
    location /tiles/ {
      proxy_pass         http://tileserv/;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Forwarded-Proto $fwd_proto;
      proxy_set_header   X-Forwarded-Host  $host;
      proxy_set_header   X-Forwarded-Path  /tiles;   # tileserv URL base
      proxy_cache        tilecache;
      proxy_cache_valid  200 1d;
      proxy_cache_key    $uri;
      add_header         X-Tile-Cache      $upstream_cache_status;
    }

    # ── L4 · pg_featureserv — OGC API – Features (REST/GeoJSON) ─────────────
    location /features/ {
      proxy_pass         http://featureserv/;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Forwarded-Proto $fwd_proto;
      proxy_set_header   X-Forwarded-Host  $host;
      proxy_set_header   X-Forwarded-Path  /features;
    }

    # ── L6 · pgAdmin — visual database administration ───────────────────────
    location /pgadmin/ {
      proxy_pass         http://pgadmin/;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Forwarded-Proto $fwd_proto;
      proxy_set_header   X-Script-Name     /pgadmin;
      proxy_set_header   X-Real-IP         $remote_addr;
    }
  }

  # ── HTTPS server (enable once certs are mounted) ──────────────────────────
  # server {
  #   listen 443 ssl http2;
  #   server_name gis.unra.go.ug;
  #   ssl_certificate     /etc/nginx/certs/fullchain.pem;
  #   ssl_certificate_key /etc/nginx/certs/privkey.pem;
  #   ssl_protocols TLSv1.2 TLSv1.3;
  #   # …identical location blocks as above…
  # }
}
